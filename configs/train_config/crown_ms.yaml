model_name: crown_ms
output_dir: /absolute/path/to/out   # absolute output root; outputs go to <output_dir>/<experiment_id>/

dataset:
  path: out/crown_ms     # relative to --working_dir (deadwood/)
  batch_size: 8
  num_workers: 4

model:
  type: unet
  in_channels: 5          # R, G, RedEdge, NIR, nDSM
  num_classes: 1          # binary crown segmentation → BCEWithLogitsLoss
  weights_name: OAM_RGB_RESNET50_TCD      # TorchGeo pretrained weight enum name, e.g. OAM_RGB_RESNET50_TCD,OAM_RGB_RESNET34_TCD
  weights_path: null      # path to a local .pt checkpoint (overrides weights_name)

# Transfer Learning phase — encoder frozen, decoder + head only
transfer:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw        # adam | adamw | sgd
  scheduler: cos          # cos | step | multistep | anneal
  step_gamma: 0.3         # only used when scheduler: step (gamma per step_size epochs)
  warmup_epochs: 3        # linear LR warmup before main scheduler kicks in (0 = disabled)
  patience: 10

# Fine-tuning phase — partial encoder unfreeze
fine_tune:
  enabled: true
  epochs: 30
  lr: 0.00005
  weight_decay: 0.0001
  unfreeze_blocks: 2      # how many ResNet encoder blocks to unfreeze from the top
  encoder_lr_scale: 0.1   # encoder LR = lr * encoder_lr_scale (differential learning rates)
  optimizer: adamw
  scheduler: cos          # cos | step | multistep | anneal
  step_gamma: 0.3         # only used when scheduler: step
  warmup_epochs: 3        # linear LR warmup after encoder unfreeze (0 = disabled)
  patience: 10

# W&B experiment tracking (set use_wandb: true to enable)
logging:
  use_wandb: true
  project: deadwood
  run_name: null
  log_every_n_steps: 50

# Loss function — weighted sum of active terms (weight 0.0 = term disabled)
loss:
  bce: 0.0
  dice: 0.5
  dice_squared: false   # true -> squared denominator variant (p^2+t^2)
  iou: 0.3
  mae: 0.2

# Evaluation metrics
metrics:
  threshold: 0.5        # sigmoid threshold for binary metrics (precision/recall/F1/IoU)
