model_name: crown_ms
output_dir: /dss/dsstbyfs02/pn49ci/pn49ci-dss-0026/di54xen/experiments/deadwood_exp   # absolute output root; outputs go to <output_dir>/<experiment_id>/

dataset:
  path: out/crown_ms     # relative to --working_dir (deadwood/)
  batch_size: 8
  num_workers: 4

model:
  type: unet
  in_channels: 5          # R, G, RedEdge, NIR, nDSM
  num_classes: 1          # binary crown segmentation → BCEWithLogitsLoss
  weights_name: OAM_RGB_RESNET50_TCD      # TorchGeo pretrained weight enum name, e.g. OAM_RGB_RESNET50_TCD,OAM_RGB_RESNET34_TCD
  weights_path: null      # path to a local .pt checkpoint (overrides weights_name)

# Transfer Learning phase — encoder frozen, decoder + head only
transfer:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw        # adam | adamw | sgd
  scheduler: cos          # cos | step | multistep | anneal
  patience: 20

# Fine-tuning phase — partial encoder unfreeze
fine_tune:
  enabled: true
  epochs: 30
  lr: 0.00005
  weight_decay: 0.0001
  unfreeze_blocks: 3      # how many ResNet encoder blocks to unfreeze from the top
  optimizer: adamw
  scheduler: cos
  patience: 20

# W&B experiment tracking (set use_wandb: true to enable)
logging:
  use_wandb: false
  project: deadwood
  run_name: null
  log_every_n_steps: 50

# Loss function — weighted sum of active terms (weight 0.0 = term disabled)
loss:
  bce: 0.3
  dice: 0.6
  dice_squared: false   # true -> squared denominator variant (p^2+t^2)
  iou: 0.0
  mae: 0.3

# Evaluation metrics
metrics:
  threshold: 0.7        # sigmoid threshold for binary metrics (precision/recall/F1/IoU)
